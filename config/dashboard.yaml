ui:
  title: "My Dashboard"
  layout:
    left_column_width: "30%"
    right_rotation_seconds: 60
  photo_rotation_seconds: 120
refresh:
  interval_minutes: 10
  jitter_seconds: 15
location:
  mode: "auto"
  fallback_city: "Stuttgart, DE"
calendar:
  sources: []
  display:
    range: "today"
    show_time: true
    show_title: true
weather:
  provider: "open_meteo"
  units: "metric"
  show_daily_days: 5
transit:
  provider: "transport_rest"
  stop_name: "Alexanderplatz"
  stop_id: "900100003"
  horizon_minutes: 60
  max_departures: 8
  transport_rest_base_url: "https://v6.vbb.transport.rest"
  transport_rest_fallback_base_urls:
    - "https://v6.db.transport.rest"
news:
  provider: "rss"
  feeds:
    - "https://www.tagesschau.de/xml/rss2"
    - "https://www.spiegel.de/international/index.rss"
  max_items: 8
finance:
  provider: "stooq_coingecko"
  symbols:
    stocks:
      - "AAPL"
      - "MSFT"
    crypto:
      - "bitcoin"
      - "ethereum"
  max_items: 8
sports:
  provider: "thesportsdb"
  sport: "Soccer"
  leagues:
    - "Bundesliga"
  max_items: 6
quotes:
  provider: "quotable"
  on_this_day_provider: "wikipedia"
  max_on_this_day_items: 3
photos:
  folder: "photos"
  extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".webp"
