ui:
  title: "My Dashboard"
  layout:
    left_column_width: "30%"
    right_rotation_seconds: 60
  photo_rotation_seconds: 120
refresh:
  interval_minutes: 10
  jitter_seconds: 15
location:
  mode: "auto"
  fallback_city: "Stuttgart, DE"
calendar:
  sources: []
  display:
    range: "today"
    show_time: true
    show_title: true
weather:
  provider: "open_meteo"
  units: "metric"
  show_daily_days: 5
transit:
  provider: "transport_rest"
  stop_name: "Alexanderplatz"
  stop_id: "900100003"
  horizon_minutes: 60
  max_departures: 8
  transport_rest_base_url: "https://v6.vbb.transport.rest"
  transport_rest_fallback_base_urls:
    - "https://v6.db.transport.rest"
photos:
  folder: "photos"
  extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".webp"
